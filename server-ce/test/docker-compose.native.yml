services:
  sharelatex:
    ports:
      - "127.0.0.1:3231:80"
    environment:
      SUPERPAPER_SITE_URL: "http://127.0.0.1:3231"

  host-admin:
    ports:
      - "127.0.0.1:3232:80"
    environment:
      NATIVE_CYPRESS: "true"
      ACCESS_CONTROL_ALLOW_ORIGIN: "http://127.0.0.1:3231"

  mailtrap:
    ports:
      - "127.0.0.1:3234:80"

  # For testing "native" on Linux
  cypress:
    build:
      context: ../../dockerfiles/cypress
      args:
        - USER_UID
        - USER_GID
    volumes:
      - ../../:/superpaper
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XAUTHORITY:-/dev/null}:/home/node/.Xauthority
    working_dir: /superpaper/server-ce/test
    entrypoint: npm
    command: run cypress:open
    environment:
      CI:
      VERBOSE_LOGGING:
      DISPLAY: ${DISPLAY:-:0}
      CYPRESS_BASE_URL:
      CYPRESS_HOST_ADMIN_URL:
      CYPRESS_MAILTRAP_URL:
    network_mode: host
