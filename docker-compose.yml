services:
  sharelatex:
    restart: always
    # Server Pro users:
    # image: quay.io/sharelatex/sharelatex-pro
    image: sharelatex/sharelatex
    container_name: sharelatex
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - 80:80
    stop_grace_period: 60s
    volumes:
      - ~/sharelatex_data:/var/lib/superpaper
      ########################################################################
      ####  Server Pro: Uncomment the following line to mount the docker  ####
      ####             socket, required for Sibling Containers to work    ####
      ########################################################################
      # - /var/run/docker.sock:/var/run/docker.sock
    environment:
      SUPERPAPER_APP_NAME: superPaper Community Edition

      SUPERPAPER_MONGO_URL: mongodb://mongo/sharelatex

      # Same property, unfortunately with different names in
      # different locations
      SUPERPAPER_REDIS_HOST: redis
      REDIS_HOST: redis

      ENABLED_LINKED_FILE_TYPES: "project_file,project_output_file"

      # Enables Thumbnail generation using ImageMagick
      ENABLE_CONVERSIONS: "true"

      # Disables email confirmation requirement
      EMAIL_CONFIRMATION_DISABLED: "true"

      ## Set for SSL via nginx-proxy
      #VIRTUAL_HOST: 103.112.212.22

      # SUPERPAPER_SITE_URL: http://superpaper.example.com
      # SUPERPAPER_NAV_TITLE: superPaper Community Edition
      # SUPERPAPER_HEADER_IMAGE_URL: http://example.com/mylogo.png
      # SUPERPAPER_ADMIN_EMAIL: support@it.com

      # SUPERPAPER_LEFT_FOOTER: '[{"text": "Another page I want to link to can be found <a href=\"here\">here</a>"} ]'
      # SUPERPAPER_RIGHT_FOOTER: '[{"text": "Hello I am on the Right"} ]'

      # SUPERPAPER_EMAIL_FROM_ADDRESS: "hello@example.com"

      # SUPERPAPER_EMAIL_AWS_SES_ACCESS_KEY_ID:
      # SUPERPAPER_EMAIL_AWS_SES_SECRET_KEY:

      # SUPERPAPER_EMAIL_SMTP_HOST: smtp.example.com
      # SUPERPAPER_EMAIL_SMTP_PORT: 587
      # SUPERPAPER_EMAIL_SMTP_SECURE: false
      # SUPERPAPER_EMAIL_SMTP_USER:
      # SUPERPAPER_EMAIL_SMTP_PASS:
      # SUPERPAPER_EMAIL_SMTP_TLS_REJECT_UNAUTH: true
      # SUPERPAPER_EMAIL_SMTP_IGNORE_TLS: false
      # SUPERPAPER_EMAIL_SMTP_NAME: '127.0.0.1'
      # SUPERPAPER_EMAIL_SMTP_LOGGER: true
      # SUPERPAPER_CUSTOM_EMAIL_FOOTER: "This system is run by department x"

      # ENABLE_CRON_RESOURCE_DELETION: true

      # SUPERPAPER_TEMPLATES_USER_ID: "578773160210479700917ee5"
      # SUPERPAPER_NEW_PROJECT_TEMPLATE_LINKS: '[ {"name":"All Templates","url":"/templates/all"}]'

      # SUPERPAPER_PROXY_LEARN: "true"

  mongo:
    restart: always
    image: mongo:6.0
    container_name: mongo
    command: "--replSet superpaper"
    volumes:
      - ~/mongo_data:/data/db
      - ./bin/shared/mongodb-init-replica-set.js:/docker-entrypoint-initdb.d/mongodb-init-replica-set.js
    environment:
      MONGO_INITDB_DATABASE: sharelatex
    extra_hosts:
      # Required when using the automatic database setup for initializing the replica set.
      # This override is not needed when running the setup after starting up mongo.
      - mongo:127.0.0.1
    healthcheck:
      test: echo 'db.stats().ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    restart: always
    image: redis:6.2
    container_name: redis
    volumes:
      - ~/redis_data:/data

  # See https://github.com/jwilder/nginx-proxy for documentation on how to configure the nginx-proxy container,
  # and https://github.com/superpaper/superpaper/wiki/HTTPS-reverse-proxy-using-Nginx for an example of some recommended
  # settings. We recommend using a properly managed nginx instance outside of the superPaper Server Pro setup,
  # but the example here can be used if you'd prefer to run everything with docker-compose

  # nginx-proxy:
  #     image: jwilder/nginx-proxy
  #     container_name: nginx-proxy
  #     ports:
  #       - "80:80"
  #       - "443:443"
  #     volumes:
  #       - /var/run/docker.sock:/tmp/docker.sock:ro
  #       - /home/superpaper/tmp:/etc/nginx/certs
