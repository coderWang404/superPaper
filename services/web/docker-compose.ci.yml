volumes:
  data:

services:
  test_unit:
    build:
      context: ../..
      dockerfile: services/web/Dockerfile
    image: ci/$PROJECT_NAME:$BRANCH_NAME-$BUILD_NUMBER
    logging:
      driver: local
    user: node
    volumes:
      - ../../bin/shared/wait_for_it:/superpaper/bin/shared/wait_for_it
      - ./data/coverage:/superpaper/services/web/data/coverage
      - ./data/reports:/superpaper/services/web/data/reports
    entrypoint: /superpaper/bin/shared/wait_for_it mongo:27017 --timeout=60 --
    command: yarn run test:unit:app
    working_dir: /superpaper/services/web
    env_file: docker-compose.common.env
    environment:
      CI:
      MODULE_NAME:
      JUNIT_ROOT_SUITE_NAME:
      BASE_CONFIG:
      SUPERPAPER_CONFIG:
      NODE_ENV: test
      NODE_OPTIONS: "--unhandled-rejections=strict"
      REDIS_HOST: redis_test
      VITEST_NO_CACHE: true
      COVERAGE_UNIT_TESTS:
      NO_COLOR: true
      MONOREPO:
    depends_on:
      - redis_test
      - mongo

  test_acceptance:
    build:
      context: ../..
      dockerfile: services/web/Dockerfile
    image: ci/$PROJECT_NAME:$BRANCH_NAME-$BUILD_NUMBER
    logging:
      driver: local
    working_dir: /superpaper/services/web
    env_file: docker-compose.common.env
    environment:
      CI:
      MODULE_NAME:
      JUNIT_ROOT_SUITE_NAME:
      BASE_CONFIG:
      SUPERPAPER_CONFIG:
      REDIS_HOST: redis_test
      COVERAGE_ACCEPTANCE_TESTS:
      NO_COLOR: true
      MONOREPO:
      RETRIES:
    extra_hosts:
      - "www.superpaper.test:127.0.0.1"
    volumes:
      - ../../bin/shared/wait_for_it:/superpaper/bin/shared/wait_for_it
      - ./data/coverage:/superpaper/services/web/data/coverage
      - ./data/reports:/superpaper/services/web/data/reports
    entrypoint: /superpaper/bin/shared/wait_for_it mongo:27017 --timeout=60 --
    command: yarn run test:acceptance:app
    depends_on:
      - redis_test
      - mongo
    tmpfs:
      - /superpaper/services/web/data:uid=1000,gid=1000

  test_frontend_jsdom:
    build:
      context: ../..
      dockerfile: services/web/Dockerfile
    image: ci/$PROJECT_NAME:$BRANCH_NAME-$BUILD_NUMBER
    volumes:
      - ./data/reports:/superpaper/services/web/data/reports
    logging:
      driver: local
    user: node
    working_dir: /superpaper/services/web
    command: yarn run test:frontend
    environment:
      NODE_OPTIONS: "--unhandled-rejections=strict"
      CI:
      JUNIT_ROOT_SUITE_NAME:
      NO_COLOR: true

  test_frontend_ct:
    build:
      context: ../../dockerfiles/cypress
      args:
        - USER_UID
        - USER_GID
    logging:
      driver: local
    working_dir: /superpaper/services/web
    environment:
      CI:
      CYPRESS_DOWNLOADS:
      CYPRESS_RESULTS:
      CYPRESS_SPEC_PATTERN:
      CYPRESS_EXCLUDE_SPEC_PATTERN:
      NO_COLOR: true
    volumes:
      - /dev/shm/superpaper:/superpaper
      - ./data/reports:/superpaper/services/web/data/reports
    entrypoint: yarn
    command:
      - "run"
      - "cypress:run-ct"

  tar:
    image: ci/$PROJECT_NAME:$BRANCH_NAME-$BUILD_NUMBER-webpack
    volumes:
      - ./:/tmp/build/
    command: tar -cf /tmp/build/build.tar public/
    user: root

  redis_test:
    image: redis:7.4.8

  mongo:
    image: mongo:8.0.11
    command: --replSet superpaper --notablescan
    volumes:
      - ../../bin/shared/mongodb-init-replica-set.js:/docker-entrypoint-initdb.d/mongodb-init-replica-set.js
      - ../../bin/shared/mongodb-docker-entrypoint-wait.sh:/mongodb-docker-entrypoint-wait.sh
    entrypoint: /mongodb-docker-entrypoint-wait.sh
    environment:
      MONGO_INITDB_DATABASE: sharelatex
    extra_hosts:
      # Required when using the automatic database setup for initializing the
      # replica set. This override is not needed when running the setup after
      # starting up mongo.
      - mongo:127.0.0.1
