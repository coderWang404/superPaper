volumes:
  data:

services:
  test_unit:
    image: node:24.14.1
    volumes:
      - .:/superpaper/services/web
      - ../../node_modules:/superpaper/node_modules
      - ../../libraries:/superpaper/libraries
      - ../../bin/shared/wait_for_it:/superpaper/bin/shared/wait_for_it
      - ../../tools/migrations:/superpaper/tools/migrations
      - ../../tsconfig.backend.json:/superpaper/tsconfig.backend.json
      - ../../package.json:/superpaper/package.json
      - ../../.yarnrc.yml:/superpaper/.yarnrc.yml
      - ../../yarn.lock:/superpaper/yarn.lock
      - ../../.yarn:/superpaper/.yarn
    working_dir: /superpaper/services/web
    env_file: docker-compose.common.env
    environment:
      BASE_CONFIG:
      SUPERPAPER_CONFIG:
      CI:
      MODULE_NAME:
      JUNIT_ROOT_SUITE_NAME:
      COVERAGE_UNIT_TESTS: ${COVERAGE_UNIT_TESTS:-}
      MOCHA_GREP: ${MOCHA_GREP:-}
      LOG_LEVEL: ${LOG_LEVEL:-}
      NODE_ENV: test
      NODE_OPTIONS: "--unhandled-rejections=strict"
      REDIS_HOST: redis_test
      MONOREPO:
    entrypoint: /superpaper/bin/shared/wait_for_it mongo:27017 --timeout=60 -- corepack
    command: yarn run --silent test:unit:app
    user: node
    depends_on:
      - mongo
      - redis_test

  test_acceptance:
    image: node:24.14.1
    volumes:
      - .:/superpaper/services/web
      - ../../node_modules:/superpaper/node_modules
      - ../../libraries:/superpaper/libraries
      - ../../bin/shared/wait_for_it:/superpaper/bin/shared/wait_for_it
      - ../../tools/migrations:/superpaper/tools/migrations
      - ../../package.json:/superpaper/package.json
      - ../../.yarnrc.yml:/superpaper/.yarnrc.yml
      - ../../yarn.lock:/superpaper/yarn.lock
      - ../../.yarn:/superpaper/.yarn
    user: node
    working_dir: /superpaper/services/web
    env_file: docker-compose.common.env
    environment:
      BASE_CONFIG:
      SUPERPAPER_CONFIG:
      CI:
      MODULE_NAME:
      JUNIT_ROOT_SUITE_NAME:
      COVERAGE_ACCEPTANCE_TESTS: ${COVERAGE_ACCEPTANCE_TESTS:-}
      MOCHA_GREP: ${MOCHA_GREP:-}
      LOG_LEVEL: ${LOG_LEVEL:-}
      MONGO_SERVER_SELECTION_TIMEOUT: 600000
      MONGO_SOCKET_TIMEOUT: 300000
      REDIS_HOST: redis_test
      MONOREPO:
      RETRIES:
      # SUPERPAPER_ALLOW_ANONYMOUS_READ_AND_WRITE_SHARING: 'true'

    extra_hosts:
      - "www.superpaper.test:127.0.0.1"
    depends_on:
      - redis_test
      - mongo
    entrypoint: /superpaper/bin/shared/wait_for_it mongo:27017 --timeout=60 -- corepack
    command: yarn run --silent test:acceptance:app

  test_frontend_jsdom:
    build:
      context: ../..
      dockerfile: services/web/Dockerfile
      target: base
    volumes:
      - .:/superpaper/services/web
      - ../../node_modules:/superpaper/node_modules
      - ../../libraries:/superpaper/libraries
      - ../../package.json:/superpaper/package.json
      - ../../.yarnrc.yml:/superpaper/.yarnrc.yml
      - ../../yarn.lock:/superpaper/yarn.lock
      - ../../.yarn:/superpaper/.yarn
    working_dir: /superpaper/services/web
    environment:
      CI:
      JUNIT_ROOT_SUITE_NAME:
      MOCHA_GREP: ${MOCHA_GREP}
      NODE_OPTIONS: "--unhandled-rejections=strict"
      VERBOSE_LOGGING:
    entrypoint: corepack
    command: yarn run --silent test:frontend
    user: node

  test_frontend_ct:
    build:
      context: ../../dockerfiles/cypress
      args:
        - USER_UID
        - USER_GID
    volumes:
      - ../../:/superpaper
    working_dir: /superpaper/services/web
    environment:
      VERBOSE_LOGGING:
      CI:
      JUNIT_ROOT_SUITE_NAME:
      CYPRESS_SPEC_PATTERN: ${CYPRESS_SPEC_PATTERN:-}
      CYPRESS_EXCLUDE_SPEC_PATTERN: ${CYPRESS_EXCLUDE_SPEC_PATTERN:-}
    entrypoint: npm
    command:
      - "run"
      - "cypress:run-ct"

  redis_test:
    image: redis:7.4.8

  mongo:
    image: mongo:8.0.11
    command: --replSet superpaper --notablescan
    volumes:
      - ../../bin/shared/mongodb-init-replica-set.js:/docker-entrypoint-initdb.d/mongodb-init-replica-set.js
      - ../../bin/shared/mongodb-docker-entrypoint-wait.sh:/mongodb-docker-entrypoint-wait.sh
    entrypoint: /mongodb-docker-entrypoint-wait.sh
    environment:
      MONGO_INITDB_DATABASE: sharelatex
    extra_hosts:
      # Required when using the automatic database setup for initializing the
      # replica set. This override is not needed when running the setup after
      # starting up mongo.
      - mongo:127.0.0.1
